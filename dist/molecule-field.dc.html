<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%; height:100%; opacity:0.55;">
  <svg viewBox="0 0 1440 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" fill="none" style="display:block;">
    <!-- benzene ring A -->
    <g stroke="#b1a6f6" stroke-width="1.4" opacity="0.7">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 240 190" to="360 240 190" dur="80s" repeatCount="indefinite"/>
        <polygon points="310,190 275,251 205,251 170,190 205,129 275,129" stroke="#b1a6f6" fill="none"/>
        <polygon points="292,190 267,234 217,234 192,190 217,146 267,146" stroke="#00b1ff" stroke-width="1" opacity="0.5" fill="none"/>
        <circle cx="310" cy="190" r="6" fill="#b1a6f6" stroke="none"/><circle cx="275" cy="251" r="6" fill="#b1a6f6" stroke="none"/><circle cx="205" cy="251" r="6" fill="#b1a6f6" stroke="none"/><circle cx="170" cy="190" r="6" fill="#b1a6f6" stroke="none"/><circle cx="205" cy="129" r="6" fill="#00b1ff" stroke="none"/><circle cx="275" cy="129" r="6" fill="#b1a6f6" stroke="none"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 24; 0 0" dur="18s" repeatCount="indefinite" additive="sum"/>
    </g>
    <!-- ring B -->
    <g stroke="#00b1ff" stroke-width="1.4" opacity="0.55">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360 1210 300" to="0 1210 300" dur="96s" repeatCount="indefinite"/>
        <polygon points="1270,300 1240,352 1180,352 1150,300 1180,248 1240,248" fill="none"/>
        <circle cx="1270" cy="300" r="6" fill="#00b1ff" stroke="none"/><circle cx="1240" cy="352" r="6" fill="#00b1ff" stroke="none"/><circle cx="1180" cy="352" r="6" fill="#00ffaa" stroke="none"/><circle cx="1150" cy="300" r="6" fill="#00b1ff" stroke="none"/><circle cx="1180" cy="248" r="6" fill="#00b1ff" stroke="none"/><circle cx="1240" cy="248" r="6" fill="#00b1ff" stroke="none"/>
      </g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -30; 0 0" dur="22s" repeatCount="indefinite" additive="sum"/>
    </g>
    <!-- node-link chain -->
    <g stroke="#b1a6f6" stroke-width="1.3" opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0 0; 26 12; 0 0" dur="26s" repeatCount="indefinite"/>
      <line x1="820" y1="700" x2="900" y2="660"/><line x1="900" y1="660" x2="980" y2="700"/><line x1="900" y1="660" x2="900" y2="580"/><line x1="900" y1="580" x2="972" y2="545"/>
      <circle cx="820" cy="700" r="7" fill="#b1a6f6" stroke="none"/><circle cx="900" cy="660" r="9" fill="#00b1ff" stroke="none"/><circle cx="980" cy="700" r="7" fill="#b1a6f6" stroke="none"/><circle cx="900" cy="580" r="7" fill="#00ffaa" stroke="none"/><circle cx="972" cy="545" r="6" fill="#b1a6f6" stroke="none"/>
    </g>
    <!-- small ring bottom-left -->
    <g stroke="#00b1ff" stroke-width="1.2" opacity="0.45">
      <animateTransform attributeName="transform" type="rotate" from="0 320 720" to="360 320 720" dur="70s" repeatCount="indefinite"/>
      <polygon points="360,720 340,754 300,754 280,720 300,686 340,686" fill="none"/>
      <circle cx="360" cy="720" r="5" fill="#00b1ff" stroke="none"/><circle cx="300" cy="686" r="5" fill="#b1a6f6" stroke="none"/><circle cx="300" cy="754" r="5" fill="#00b1ff" stroke="none"/>
    </g>
    <!-- floating atoms -->
    <circle cx="640" cy="230" r="5" fill="#b1a6f6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1090" cy="640" r="4" fill="#00b1ff"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="480" r="4" fill="#00ffaa"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="1300" cy="120" r="5" fill="#b1a6f6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="470" r="4" fill="#00b1ff"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="7.5s" repeatCount="indefinite"/></circle>
  </svg>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}"></script>
</body>
</html>
